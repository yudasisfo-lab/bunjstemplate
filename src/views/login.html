<!DOCTYPE html>
<html>

<head>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="flex items-center justify-center h-screen bg-gray-100">
    <form method="POST" action="/login" class="bg-white p-6 rounded-xl shadow w-80">
        <h2 class="text-xl mb-4">Login</h2>
        <input name="username" placeholder="Username" class="w-full mb-2 p-2 border" />
        <input name="password" type="password" placeholder="Password" class="w-full mb-4 p-2 border" />
        <button class="bg-blue-500 text-white w-full p-2 rounded">Login</button>
    </form>
</body>

</html>
