<!DOCTYPE html>
<html>

<head>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">
    <div class="flex">
        <aside class="w-64 bg-gray-800 text-white min-h-screen p-4">
            <h1 class="text-xl font-bold">Admin</h1>
            <a href="/logout" class="block mt-4">Logout</a>
        </aside>
        <main class="flex-1 p-6">
            <h2 class="text-2xl mb-4">Dashboard</h2>

            <div id="stats" class="grid grid-cols-3 gap-4"></div>

            <script>
                fetch('/api/stats')
                    .then(res => res.json())
                    .then(data => {
                        document.getElementById('stats').innerHTML = `
            <div class='bg-white p-4 rounded shadow'>Users: ${data.users}</div>
            <div class='bg-white p-4 rounded shadow'>Orders: ${data.orders}</div>
            <div class='bg-white p-4 rounded shadow'>Revenue: ${data.revenue}</div>
          `
                    })
            </script>
        </main>
    </div>
</body>

</html>
